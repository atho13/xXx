proxy-providers:
  MIX:
    type: file
    path: "./providers/proxy/mix.yaml"
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 120
proxy-groups:
- name: AUTO-MIX
  type: fallback
  disable-udp: false
  use:
  - MIX
  url: http://www.gstatic.com/generate_204
  interval: 120
- name: SERVER-UMUM
  type: select
  disable-udp: false
  proxies:
  - AUTO-MIX
- name: SERVER-GAME
  type: select
  disable-udp: false
  proxies:
  - SERVER-UMUM
  - DIRECT
- name: FB-IG-LINE
  type: select
  disable-udp: false
  proxies:
  - DIRECT
  - SERVER-UMUM
- name: WHATSAPP
  type: select
  disable-udp: false
  proxies:
  - DIRECT
  - SERVER-UMUM
- name: YOUTUBE
  type: select
  disable-udp: false
  proxies:
  - DIRECT
  - SERVER-UMUM
- name: NETFLIX
  type: select
  disable-udp: false
  proxies:
  - DIRECT
  - SERVER-UMUM
- name: TIKTOK
  type: select
  disable-udp: false
  proxies:
  - DIRECT
  - SERVER-UMUM
rule-providers:
  bankid:
    type: file
    behavior: domain
    path: "./providers/rule/bankid.yaml"
  game:
    type: file
    behavior: classical
    path: "./providers/rule/game.yaml"
  portgame:
    type: file
    behavior: classical
    path: "./providers/rule/portgame.yaml"
  umum:
    type: file
    behavior: classical
    path: "./providers/rule/umum.yaml"
  whatsapp:
    type: file
    behavior: classical
    path: "./providers/rule/whatsapp.yaml"
  youtube:
    type: file
    behavior: classical
    path: "./providers/rule/youtube.yaml"
  fb:
    type: file
    behavior: classical
    path: "./providers/rule/fb.yaml"
  meta:
    type: file
    behavior: classical
    path: "./providers/rule/meta.yaml"
  ig:
    type: file
    behavior: classical
    path: "./providers/rule/ig.yaml"
  line:
    type: file
    behavior: classical
    path: "./providers/rule/line.yaml"
  netflix:
    type: file
    behavior: classical
    path: "./providers/rule/netflix.yaml"
  tiktok:
    type: file
    behavior: classical
    path: "./providers/rule/tiktok.yaml"
rules:
- RULE-SET,whatsapp,WHATSAPP
- RULE-SET,line,FB-IG-LINE
- RULE-SET,fb,FB-IG-LINE
- RULE-SET,meta,FB-IG-LINE
- RULE-SET,ig,FB-IG-LINE
- RULE-SET,youtube,YOUTUBE
- RULE-SET,netflix,NETFLIX
- RULE-SET,tiktok,TIKTOK
- RULE-SET,umum,SERVER-UMUM
- RULE-SET,game,SERVER-GAME
- RULE-SET,portgame,SERVER-GAME
- RULE-SET,bankid,SERVER-UMUM
- MATCH,SERVER-UMUM