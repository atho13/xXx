proxy-providers:
  ID:
    type: file
    path: "./providers/proxy/id.yaml"
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 120
  MIX:
    type: file
    path: "./providers/proxy/mix.yaml"
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 120
proxy-groups:
- name: AUTO-ID-MIX
  type: fallback
  disable-udp: false
  use:
  - ID
  - MIX
  url: http://www.gstatic.com/generate_204
  interval: 120
- name: LB-MIX-ID
  type: load-balance
  strategy: consistent-hashing
  disable-udp: false
  use:
  - MIX
  - ID
  url: http://www.gstatic.com/generate_204
  interval: 120
- name: SERVER-UMUM
  type: select
  disable-udp: false
  proxies:
  - AUTO-ID-MIX
  - LB-MIX-ID
- name: SERVER-INDO
  type: select
  disable-udp: false
  proxies:
  - AUTO-ID-MIX
- name: SERVER-GAME
  type: select
  disable-udp: false
  proxies:
  - AUTO-ID-MIX
  - DIRECT
- name: BLOCK-IKLAN
  type: select
  disable-udp: false
  proxies:
  - REJECT
  - SERVER-UMUM
rule-providers:
  Game:
    type: file
    behavior: classical
    path: "./providers/rule/game.yaml"
  PortGame:
    type: file
    behavior: classical
    path: "./providers/rule/portgame.yaml"
  Umum:
    type: file
    behavior: classical
    path: "./providers/rule/umum.yaml"
  indo:
    type: file
    behavior: classical
    path: "./providers/rule/indo.yaml"
  Sosmed:
    type: file
    behavior: classical
    path: "./providers/rule/sosmed.yaml"
  Streaming:
    type: file
    behavior: classical
    path: "./providers/rule/streaming.yaml"
  Bankid:
    type: file
    behavior: domain
    path: "./providers/rule/bankid.yaml"
  Tiktok:
    type: file
    behavior: domain
    path: "./providers/rule/tiktok.yaml"
  Meta:
    type: file
    behavior: domain
    path: "./providers/rule/meta.yaml"
rules:
- RULE-SET,Umum,SERVER-UMUM
- RULE-SET,Game,SERVER-GAME
- RULE-SET,PortGame,SERVER-GAME
- RULE-SET,indo,SERVER-INDO
- RULE-SET,Sosmed,SERVER-INDO
- RULE-SET,Streaming,SERVER-UMUM
- RULE-SET,Bankid,SERVER-INDO
- RULE-SET,Tiktok,SERVER-UMUM
- RULE-SET,Meta,SERVER-INDO
- MATCH,SERVER-UMUM