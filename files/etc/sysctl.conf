# Defaults are configured in /etc/sysctl.d/* and can be customized in this file
# Increase the maximum number of tracked connections
net.netfilter.nf_conntrack_max = 65536
# Reduce timeouts to free up entries faster
net.netfilter.nf_conntrack_tcp_timeout_established = 1800
net.netfilter.nf_conntrack_tcp_timeout_close_wait = 20
net.netfilter.nf_conntrack_tcp_timeout_fin_wait = 30
# Add or modify other buffer timeout settings as needed
net.core.rmem_max=33554432
net.core.wmem_max=33554432
net.core.rmem_default=65536
net.core.wmem_default=65536
net.core.optmem_max=25165824
# Disable conntrack checksumming (optional, improves performance)
net.netfilter.nf_conntrack_checksum = 0