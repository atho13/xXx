name: Build FRDMX (Manual URL Mode)

on:
  workflow_dispatch:
    inputs:
      custom_url:
        description: "Tempel URL Image Builder (.tar.zst atau .tar.xz) di sini"
        #default: "https://downloads.openwrt.org/releases/25.12.1/targets/x86/generic/openwrt-imagebuilder-25.12.1-x86-generic.Linux-x86_64.tar.zst"
        default: "https://downloads.openwrt.org/releases/25.12.1/targets/armsr/armv8/openwrt-imagebuilder-25.12.1-armsr-armv8.Linux-x86_64.tar.zst"
      target:
        description: "Pilih Target Hardware (Sesuaikan dengan isi URL)"
        required: true
        default: "Amlogic"
        type: choice
        options:
          - X86-64
          - Amlogic
      board:
        description: "Pilih Board Amlogic (Hanya jika target Amlogic)"
        required: true
        default: "s905x"
        type: choice
        options: ["s905x-b860h", "s905x", "s905x3", "s905x2", "s905w", "s912", "s922x", "s905d", "n1"]
      kernel:
        description: "Pilih Kernel Amlogic"
        required: true
        default: "6.12.y"
        type: choice
        options: ["6.12.y", "6.6.y", "6.1.y"]
      tunnel:
        description: "Pilih Tunnel VPN"
        required: true
        default: "no-tunnel"
        type: choice
        options: ["no-tunnel", "openclash", "nikki"]

env:
  TZ: Asia/Jakarta
  WORKING_DIR: imagebuilder

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Initialization Environment
        run: |
          sudo timedatectl set-timezone "${{ env.TZ }}"
          sudo apt-get update
          # Wajib instal zstd untuk menangani file .tar.zst
          sudo apt-get install -y build-essential clang flex bison g++ gawk gettext \
          git libncurses5-dev libssl-dev rsync unzip zlib1g-dev \
          curl tar qemu-utils wget python3-setuptools python3-dev python-is-python3 zstd

      - name: Download Manual Image Builder
        run: |
          URL="${{ github.event.inputs.custom_url }}"
          
          # Proteksi jika user lupa mengganti URL default
          if [[ "$URL" == "https://downloads.openwrt.org" ]]; then
            echo "ERROR: Anda harus memasukkan URL lengkap sampai nama file .tar.zst!"
            exit 1
          fi

          echo "Processing Manual URL: $URL"
          mkdir -p ${{ env.WORKING_DIR }}
          
          # Gunakan wget dengan retry dan cek status 
          # -O- mengirim data ke pipe (|), tar mengekstraknya
          if [[ "$URL" == *.zst ]]; then
            wget -qO- "$URL" | tar --zstd -xf - -C ${{ env.WORKING_DIR }} --strip-components=1
          else
            wget -qO- "$URL" | tar -xJ -C ${{ env.WORKING_DIR }} --strip-components=1
          fi
          
          # Cek apakah folder hasil ekstrak kosong (artinya download gagal)
          if [ -z "$(ls -A ${{ env.WORKING_DIR }})" ]; then
             echo "ERROR: Download gagal atau file korup (bukan file tar/zst)."
             exit 1
          fi


      - name: Build Rootfs/Image
        run: |
          mkdir -p compiled_images
          # Pastikan file script lokal ada dan punya izin eksekusi
          chmod +x scripts/*.sh
          
          cd ${{ env.WORKING_DIR }}
          
          # Logika Build berdasarkan Target Input
          if [ "${{ github.event.inputs.target }}" == "X86-64" ]; then
            bash ../scripts/aml-x86.sh "generic" "${{ github.event.inputs.tunnel }}"
          else
            bash ../scripts/aml-x86.sh "default" "${{ github.event.inputs.tunnel }}"
          fi
          
          # Cari file hasil build (tar.gz atau img.gz)
          find bin/targets/ -type f \( -name "*.tar.gz" -o -name "*.img.gz" \) -exec cp {} ../compiled_images/ \; 2>/dev/null || true

      - name: Repack Amlogic (Conditional)
        if: github.event.inputs.target == 'Amlogic-TVBox'
        run: |
          chmod +x scripts/REPACK25.sh
          ./scripts/REPACK25.sh "ophub" "${{ github.event.inputs.board }}" "${{ github.event.inputs.kernel }}" "${{ github.event.inputs.tunnel }}"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FRDMX-Manual-Build
          path: |
            compiled_images/*.tar.gz
            compiled_images/*.img.gz
            out/*.img
            *.img

      - name: Cleanup
        if: always()
        run: |
          sudo rm -rf ${{ env.WORKING_DIR }}
          sudo rm -rf compiled_images
