name: Build FRDMX Hybrid (x86 & Amlogic)

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Pilih Target Hardware"
        required: true
        default: "Amlogic-TVBox"
        type: choice
        options:
          - X86-64
          - Amlogic-TVBox
      board:
        description: "Pilih Board Amlogic (Khusus Amlogic)"
        required: true
        default: "s905x"
        type: choice
        options: ["s905x-b860h", "s905x", "s905x3", "s905x2", "s905w", "s912", "s922x", "s905d", "n1"]
      kernel:
        description: "Pilih Versi Kernel Amlogic"
        required: true
        default: "6.6.y"
        type: choice
        options: ["6.6.y", "6.12.y", "6.1.y"]
      tunnel:
        description: "Pilih Tunnel VPN"
        required: true
        default: "no-tunnel"
        type: choice
        options: ["no-tunnel", "openclash", "nikki"]

env:
  TZ: Asia/Jakarta
  WORKING_DIR: imagebuilder
  # Ganti VER ke versi OpenWrt/ImmortalWrt yang Anda inginkan
  VER: "23.05.3" 

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Initialization Environment
        run: |
          sudo timedatectl set-timezone "${{ env.TZ }}"
          sudo apt-get update
          # Perbaikan: python3-distutils diganti dengan python3-setuptools & python-is-python3
          sudo apt-get install -y build-essential clang flex bison g++ gawk gettext \
          git libncurses5-dev libssl-dev rsync unzip zlib1g-dev \
          curl tar qemu-utils wget python3-setuptools python3-dev python-is-python3

      - name: Download Image Builder
        run: |
          # Logika URL lengkap untuk Image Builder
          if [ "${{ github.event.inputs.target }}" == "X86-64" ]; then
            URL="https://downloads.openwrt.org{{ env.VER }}/targets/x86/64/openwrt-imagebuilder-${{ env.VER }}-x86-64.Linux-x86_64.tar.xz"
          else
            URL="https://downloads.openwrt.org{{ env.VER }}/targets/armvirt/64/openwrt-imagebuilder-${{ env.VER }}-armvirt-64.Linux-x86_64.tar.xz"
          fi
          
          echo "Downloading: $URL"
          mkdir -p ${{ env.WORKING_DIR }}
          wget -qO- "$URL" | tar -xJ -C ${{ env.WORKING_DIR }} --strip-components=1

      - name: Build Rootfs/Image (Hybrid Mode)
        run: |
          mkdir -p compiled_images
          # Pastikan script di folder repo bisa dieksekusi
          chmod +x scripts/*.sh
          
          cd ${{ env.WORKING_DIR }}
          # Ambil profile berdasarkan target
          if [ "${{ github.event.inputs.target }}" == "X86-64" ]; then
            bash ../scripts/aml-x86.sh "generic" "${{ github.event.inputs.tunnel }}"
          else
            bash ../scripts/aml-x86.sh "default" "${{ github.event.inputs.tunnel }}"
          fi
          
          # Jika script Anda menaruh hasil di bin/, pindahkan ke compiled_images
          find bin/targets/ -type f -name "*.tar.gz" -exec cp {} ../compiled_images/ \;
          find bin/targets/ -type f -name "*.img.gz" -exec cp {} ../compiled_images/ \;

      - name: Repack Amlogic (Hanya jika Target Amlogic)
        if: github.event.inputs.target == 'Amlogic-TVBox'
        run: |
          # Menjalankan repack menggunakan hasil rootfs dari step sebelumnya
          ./scripts/REPACK25.sh "ophub" "${{ github.event.inputs.board }}" "${{ github.event.inputs.kernel }}" "${{ github.event.inputs.tunnel }}"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FRDMX-${{ github.event.inputs.target }}-${{ github.event.inputs.board }}-${{ github.event.inputs.tunnel }}
          path: |
            compiled_images/*.img.gz
            compiled_images/*.tar.gz
            *.img
            out/*.img

      - name: Cleanup
        if: always()
        run: |
          sudo rm -rf ${{ env.WORKING_DIR }}
          sudo rm -rf compiled_images
