name: Build FRDMX Hybrid (v25.12.1 Stable)

on:
  workflow_dispatch:
    inputs:
      release_branch:
        description: "Pilih Versi OpenWrt"
        required: true
        default: "openwrt:25.12.1"
        type: choice
        options:
          - "openwrt:25.12.1"
          - "immortalwrt:25.12.1"
      target:
        description: "Pilih Target Hardware"
        required: true
        default: "Amlogic-TVBox"
        type: choice
        options:
          - X86-64
          - Amlogic-TVBox
      board:
        description: "Pilih Board Amlogic"
        required: true
        default: "s905x"
        type: choice
        options: ["s905x-b860h", "s905x", "s905x3", "s905x2", "s905w", "s912", "s922x", "s905d", "n1"]
      kernel:
        description: "Pilih Versi Kernel Amlogic"
        required: true
        default: "6.12.y"
        type: choice
        options: ["6.12.y", "6.6.y", "6.1.y"]
      tunnel:
        description: "Pilih Tunnel VPN"
        required: true
        default: "no-tunnel"
        type: choice
        options: ["no-tunnel", "openclash", "nikki"]

env:
  TZ: Asia/Jakarta
  WORKING_DIR: imagebuilder

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Initialization Environment
        run: |
          sudo timedatectl set-timezone "${{ env.TZ }}"
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gettext \
          git libncurses5-dev libssl-dev rsync unzip zlib1g-dev \
          curl tar qemu-utils wget python3-setuptools python3-dev python-is-python3 zstd

      - name: Download Image Builder
        run: |
          # SOLUSI: Pisahkan Nama Distro dan Versi menggunakan Bash cut
          INPUT_STR="${{ github.event.inputs.release_branch }}"
          BASE=$(echo $INPUT_STR | cut -d':' -f1)
          VER=$(echo $INPUT_STR | cut -d':' -f2)
          
          # Tentukan URL berdasarkan Target (x86 atau ArmVirt)
          if [ "${{ github.event.inputs.target }}" == "X86-64" ]; then
            URL="https://downloads.${BASE}.org/releases/${VER}/targets/x86/64/${BASE}-imagebuilder-${VER}-x86-64.Linux-x86_64.tar.zst"
          else
            URL="https://downloads.${BASE}.org/releases/${VER}/targets/armvirt/64/${BASE}-imagebuilder-${VER}-armvirt-64.Linux-x86_64.tar.zst"
          fi
          
          echo "Downloading from: $URL"
          mkdir -p ${{ env.WORKING_DIR }}
          # Gunakan --zstd untuk ekstrak file .tar.zst dari versi 25.x
          wget -qO- "$URL" | tar --zstd -xf - -C ${{ env.WORKING_DIR }} --strip-components=1

      - name: Build Rootfs/Image (Hybrid Mode)
        run: |
          mkdir -p compiled_images
          chmod +x scripts/*.sh
          
          cd ${{ env.WORKING_DIR }}
          # Menjalankan build dengan profil sesuai target
          if [ "${{ github.event.inputs.target }}" == "X86-64" ]; then
            bash ../scripts/aml-x86.sh "generic" "${{ github.event.inputs.tunnel }}"
          else
            bash ../scripts/aml-x86.sh "default" "${{ github.event.inputs.tunnel }}"
          fi
          
          # Salin file hasil build (.tar.gz atau .img.gz)
          find bin/targets/ -type f \( -name "*.tar.gz" -o -name "*.img.gz" \) -exec cp {} ../compiled_images/ \; 2>/dev/null || true

      - name: Repack Amlogic (Hanya jika Target Amlogic)
        if: github.event.inputs.target == 'Amlogic-TVBox'
        run: |
          chmod +x scripts/REPACK25.sh
          # Jalankan skrip repack menggunakan board dan kernel dari input
          ./scripts/REPACK25.sh "ophub" "${{ github.event.inputs.board }}" "${{ github.event.inputs.kernel }}" "${{ github.event.inputs.tunnel }}"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FRDMX-v25.12.1-${{ github.event.inputs.target }}
          path: |
            compiled_images/*.tar.gz
            compiled_images/*.img.gz
            out/*.img
            *.img

      - name: Cleanup
        if: always()
        run: |
          sudo rm -rf ${{ env.WORKING_DIR }}
          sudo rm -rf compiled_images
