name: Build FRDMX Hybrid (v25.12.1 Stable)

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Pilih Target Hardware"
        required: true
        default: "Amlogic-TVBox"
        type: choice
        options:
          - X86-64
          - Amlogic-TVBox
      board:
        description: "Pilih Board Amlogic (Khusus Amlogic)"
        required: true
        default: "s905x"
        type: choice
        options: ["s905x-b860h", "s905x", "s905x3", "s905x2", "s905w", "s912", "s922x", "s905d", "n1"]
      kernel:
        description: "Pilih Versi Kernel Amlogic"
        required: true
        default: "6.12.y"
        type: choice
        options: ["6.12.y", "6.6.y", "6.1.y", "5.15.y"]
      tunnel:
        description: "Pilih Tunnel VPN"
        required: true
        default: "no-tunnel"
        type: choice
        options: ["no-tunnel", "openclash", "nikki"]

env:
  TZ: Asia/Jakarta
  WORKING_DIR: imagebuilder
  # VERSI STABLE 25.12.1
  VER: "25.12.1"

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Initialization Environment
        run: |
          sudo timedatectl set-timezone "${{ env.TZ }}"
          sudo apt-get update
          # Menggunakan zstd untuk ekstraksi .tar.zst dan paket python3 terbaru
          sudo apt-get install -y build-essential clang flex bison g++ gawk gettext \
          git libncurses5-dev libssl-dev rsync unzip zlib1g-dev \
          curl tar qemu-utils wget python3-setuptools python3-dev python-is-python3 zstd

      - name: Download Image Builder
        run: |
          # URL Rilis 25.12.1 Stable (Ganti domain ke immortalwrt jika perlu)
          if [ "${{ github.event.inputs.target }}" == "X86-64" ]; then
            URL="https://downloads.openwrt.org{{ env.VER }}/targets/x86/64/openwrt-imagebuilder-${{ env.VER }}-x86-64.Linux-x86_64.tar.zst"
          else
            # ArmVirt tetap yang terbaik untuk repack Amlogic
            URL="https://downloads.openwrt.org{{ env.VER }}/targets/armvirt/64/openwrt-imagebuilder-${{ env.VER }}-armvirt-64.Linux-x86_64.tar.zst"
          fi
          
          echo "Downloading Version ${{ env.VER }}: $URL"
          mkdir -p ${{ env.WORKING_DIR }}
          # Perbaikan cara ekstrak file .tar.zst
          wget -qO- "$URL" | tar --zstd -xf - -C ${{ env.WORKING_DIR }} --strip-components=1

      - name: Build Rootfs/Image (Hybrid Mode)
        run: |
          mkdir -p compiled_images
          # Memberi izin eksekusi ke folder scripts di repo Anda
          chmod +x scripts/*.sh
          
          cd ${{ env.WORKING_DIR }}
          if [ "${{ github.event.inputs.target }}" == "X86-64" ]; then
            bash ../scripts/aml-x86.sh "generic" "${{ github.event.inputs.tunnel }}"
          else
            bash ../scripts/aml-x86.sh "default" "${{ github.event.inputs.tunnel }}"
          fi
          
          # Mengambil hasil build (biasanya di bin/targets/...)
          find bin/targets/ -type f \( -name "*.tar.gz" -o -name "*.img.gz" \) -exec cp {} ../compiled_images/ \; 2>/dev/null || true

      - name: Repack Amlogic (Hanya jika Target Amlogic)
        if: github.event.inputs.target == 'Amlogic-TVBox'
        run: |
          # Menjalankan script repack eksternal (pastikan file ini ada di folder scripts/)
          chmod +x scripts/REPACK25.sh
          ./scripts/REPACK25.sh "ophub" "${{ github.event.inputs.board }}" "${{ github.event.inputs.kernel }}" "${{ github.event.inputs.tunnel }}"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FRDMX-v${{ env.VER }}-${{ github.event.inputs.target }}-${{ github.event.inputs.board }}
          path: |
            compiled_images/*.tar.gz
            compiled_images/*.img.gz
            out/*.img
            *.img

      - name: Cleanup
        if: always()
        run: |
          sudo rm -rf ${{ env.WORKING_DIR }}
          sudo rm -rf compiled_images
