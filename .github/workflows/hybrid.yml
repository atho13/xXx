name: Build FRDMX Hybrid (x86 & Amlogic)

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      custom_url:
        description: "URL Image Builder (.tar.zst)"
        required: true
        default: "https://downloads.openwrt.org"
      target:
        description: "Pilih Target Hardware"
        required: true
        default: "Amlogic"
        type: choice
        options: ["X86-64", "Amlogic"]
      board:
        description: "Pilih Board Amlogic (Hanya jika Amlogic)"
        required: true
        default: "s905x"
        type: choice
        options: ["s905x", "s905x-b860h", "s905x3", "s905x2", "s905w", "n1"]
      kernel:
        description: "Versi Kernel (Hanya jika Amlogic)"
        required: true
        default: "6.12.y"
        type: choice
        options: ["6.12.y", "6.6.y", "6.1.y"]

env:
  TZ: Asia/Jakarta
  WORKING_DIR: imagebuilder

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Initialization Environment
        run: |
          sudo timedatectl set-timezone "${{ env.TZ }}"
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gettext \
          git libncurses5-dev libssl-dev rsync unzip zlib1g-dev \
          curl tar qemu-utils wget python3-setuptools python3-dev python-is-python3 zstd

      - name: Download Image Builder
        run: |
          URL="${{ github.event.inputs.custom_url }}"
          mkdir -p ${{ env.WORKING_DIR }}
          if [[ "$URL" == *.zst ]]; then
            wget -qO- "$URL" | tar --zstd -xf - -C ${{ env.WORKING_DIR }} --strip-components=1
          else
            wget -qO- "$URL" | tar -xJ -C ${{ env.WORKING_DIR }} --strip-components=1
          fi

      - name: Build Firmware
        run: |
          mkdir -p compiled_images
          chmod +x scripts/*.sh
          cd ${{ env.WORKING_DIR }}
          # Jalankan script build utama
          if [ "${{ github.event.inputs.target }}" == "X86-64" ]; then
            bash ../scripts/aml-x86.sh "generic"
          else
            bash ../scripts/aml-x86.sh "default"
          fi
          # Kumpulkan hasil build
          find bin/targets/ -type f \( -name "*.tar.gz" -o -name "*.img.gz" \) -exec cp {} ../compiled_images/ \;

      - name: Repack Amlogic (Hanya jika Target Amlogic)
        if: github.event.inputs.target == 'Amlogic'
        env:
          GH_TOKEN: ${{ secrets.AKSI_TOKEN }}
        run: |
          chmod +x scripts/REPACK25.sh
          ./scripts/REPACK25.sh "ophub" "${{ github.event.inputs.board }}" "${{ github.event.inputs.kernel }}"

      - name: Generate Release Tag
        id: tag
        run: |
          echo "release_tag=$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_OUTPUT
          echo "release_date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          name: FRDMX Build - ${{ steps.tag.outputs.release_date }}
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            compiled_images/*.tar.gz
            compiled_images/*.img.gz
            compiled_images/*.img
