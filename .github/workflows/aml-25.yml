name: OpenWrt Build

on:
  workflow_dispatch:
    inputs:
      repack_model:
        description: "Pilih Model SoC (s905x, s905x2, s905x3, s912, n1, hg680p, b860h)"
        required: true
        default: "s905x"
      kernel_version:
        description: "Kernel"
        required: true
        default: "6.12.y"

env:
  TZ: Asia/Jakarta
  WORKING_DIR: imagebuilder

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gettext \
          git libncurses5-dev libssl-dev python3-distutils python3-setuptools rsync \
          unzip zlib1g-dev curl tar wget zstd qemu-user-static binfmt-support

      - name: Download & Extract Image Builder
        run: |
          # URL Resmi OpenWrt 25.12.1 Stable (Rilis Maret 2026)
          URL="https://downloads.openwrt.org"
          mkdir -p ${{ env.WORKING_DIR }}
          wget -qO ib_file.tar.zst "$URL"
          zstd -d ib_file.tar.zst -c | tar -x -C ${{ env.WORKING_DIR }} --strip-components=1

      - name: Run Build Rootfs
        run: |
          chmod +x scripts/aml-rootfs.sh
          cd ${{ env.WORKING_DIR }}
          ../scripts/aml-25.sh

      - name: Repack to .img (Ophub Tool)
        run: |
          # Persiapan Tool Ophub
          git clone --depth 1 https://github.com/ribel13/amlogic-s9xxx-openwrt.git amlogic
          
          # Ambil file rootfs hasil build (biasanya di bin/targets/armvirt/64/)
          ROOTFS=$(ls ${{ env.WORKING_DIR }}/bin/targets/armvirt/64/*.tar.* | head -n 1)
          mkdir -p amlogic/openwrt-armvirt
          cp "$ROOTFS" amlogic/openwrt-armvirt/openwrt-armvirt-64-default-rootfs.tar.gz
          
          # Jalankan perintah repack
          cd amlogic
          sudo ./make -b ${{ github.event.inputs.repack_model }} -k ${{ github.event.inputs.kernel_version }}
          
          # Pindahkan hasil ke folder luar
          mkdir -p ../output
          mv out/*.img ../output/

      - name: Upload Firmware (.img)
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt_Amlogic_${{ github.event.inputs.repack_model }}_${{ github.event.inputs.kernel_version }}
          path: output/*.img
